<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>TMVE Tracker</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, Roboto, 'Segoe UI', sans-serif;
    background: #0f1419;
    color: #e8eaed;
    padding: 16px;
    padding-bottom: 40px;
    min-height: 100vh;
  }
  .title {
    font-size: 22px;
    font-weight: 700;
    color: #4a9eff;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card {
    background: #1a2128;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    border: 1px solid #2a333d;
  }
  .status { font-size: 14px; color: #9aa5b1; }
  .gps-info { font-size: 13px; color: #7d8590; margin-top: 4px; }
  .station-name {
    font-size: 20px;
    font-weight: 700;
    color: #4caf50;
    margin-bottom: 4px;
  }
  .distance { font-size: 15px; color: #e8eaed; }
  .meta { font-size: 13px; color: #9aa5b1; margin-top: 4px; }
  .btn-row { display: flex; gap: 10px; margin: 14px 0; }
  button {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  #btnStart { background: #1565C0; color: white; }
  #btnStart:disabled { background: #2a333d; color: #5a6573; }
  #btnStop { background: #c62828; color: white; }
  #btnStop:disabled { background: #2a333d; color: #5a6573; }
  #btnExport { background: #2a333d; color: #e8eaed; width: 100%; margin-top: 6px; }
  .log-title { font-size: 14px; font-weight: 700; margin: 14px 0 8px; color: #e8eaed; }
  .log-box {
    background: #1a2128;
    border: 1px solid #2a333d;
    border-radius: 12px;
    padding: 10px 14px;
    max-height: 240px;
    overflow-y: auto;
    font-size: 13px;
    line-height: 1.7;
  }
  .log-line { color: #9aa5b1; border-bottom: 1px solid #232b33; padding: 4px 0; }
  .log-line:last-child { border-bottom: none; }
  .install-banner {
    background: #1565C0;
    padding: 10px 14px;
    border-radius: 10px;
    margin-bottom: 14px;
    font-size: 13px;
    display: none;
  }
  .install-banner.show { display: block; }
  .install-banner button {
    margin-top: 8px;
    background: white;
    color: #1565C0;
    padding: 8px;
  }
</style>
</head>

// ---------- Haversine distance ----------
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function findNearest(lat, lon) {
  let best = null, bestD = Infinity;
  for (const s of STATIONS) {
    const d = haversine(lat, lon, s.la, s.lo);
    if (d < bestD) { bestD = d; best = s; }
  }
  return [best, bestD];
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-ES';
  u.rate = 1.0;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function updateStation(lat, lon) {
  document.getElementById('lblGps').textContent = `📍 GPS: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;
  const [st, dist] = findNearest(lat, lon);
  if (!st) return;
  document.getElementById('lblStation').textContent = `🔵 ${st.n}`;
  document.getElementById('lblDist').textContent = dist < 1000
    ? `📏 ${dist.toFixed(0)} m`
    : `📏 ${(dist/1000).toFixed(2)} km`;
  document.getElementById('lblInfo').textContent = `ℹ️ ${st.r}  |  ${st.t}`;

  if (st.n !== currentStation) {
    currentStation = st.n;
    const hora = new Date().toLocaleTimeString('es-VE', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    logLines.push(`${hora} → ${st.n}`);
    renderLog();
    speak(`Estación: ${st.n}`);
  }
}

function renderLog() {
  const box = document.getElementById('logBox');
  box.innerHTML = logLines.slice(-100).reverse()
    .map(l => `<div class="log-line">${l}</div>`).join('');
}

function startTracking() {
  if (!('geolocation' in navigator)) {
    alert('GPS no disponible en este navegador.');
    return;
  }
  active = true;
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').disabled = false;
  document.getElementById('lblStatus').textContent = '🟢 Rastreo activo...';

  watchId = navigator.geolocation.watchPosition(
    (pos) => {
      if (active) updateStation(pos.coords.latitude, pos.coords.longitude);
    },
    (err) => {
      document.getElementById('lblStatus').textContent = `⚠️ Error GPS: ${err.message}`;
    },
    { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 }
  );
}

function stopTracking() {
  active = false;
  if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').disabled = true;
  document.getElementById('lblStatus').textContent = `✅ ${STATIONS.length} estaciones cargadas. Detenido.`;
}

function exportLog() {
  const text = logLines.join('\n');
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const fecha = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `tmve_ruta_${fecha}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

document.getElementById('btnStart').addEventListener('click', startTracking);
document.getElementById('btnStop').addEventListener('click', stopTracking);
document.getElementById('btnExport').addEventListener('click', exportLog);

// ---------- PWA install prompt ----------
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});
document.getElementById('btnInstall').addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    document.getElementById('installBanner').classList.remove('show');
  }
});

// ---------- Register service worker for offline use ----------
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
