name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build APK with Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            -e ANDROIDAPI=31 \
            -e ANDROIDMINAPI=21 \
            -e ANDROIDNDK=25b \
            kivy/buildozer:latest \
            sh -c "cd /home/user/hostcwd && \
              yes | sdkmanager --licenses && \
              sdkmanager 'build-tools;30.0.3' 'platforms;android-31' && \
              buildozer android debug"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TMVETracker-APK
          path: bin/*.apk
